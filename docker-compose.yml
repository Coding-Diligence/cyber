version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: mongodb-secure
    environment:
      MONGO_INITDB_DATABASE: mongodb-secure
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - secure-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/mongodb-secure --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: api-secure
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://mongodb:27017/mongodb-secure
    ports:
      - "3000:3000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - secure-network
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mongodb_data:

networks:
  secure-network:
    driver: bridge
